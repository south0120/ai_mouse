<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI-dictionary 設定</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .desc {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    select, input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus { border-color: #4a90d9; }
    .provider-info {
      margin-top: 8px;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
    .provider-info code {
      background: #e9ecef;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .btn-row { display: flex; gap: 10px; margin-top: 28px; }
    button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn { background: #4a90d9; color: #fff; }
    .save-btn:hover { background: #3a7bc8; }
    .test-btn { background: #e9ecef; color: #333; }
    .test-btn:hover { background: #dde1e6; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #d4edda; color: #155724; }
    .toast.error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI-dictionary 設定</h1>

    <div class="field">
      <label>AIプロバイダー</label>
      <select id="provider">
        <option value="">選択してください</option>
        <option value="cloud">クラウド（デフォルト）</option>
        <option value="mercury">Mercury-2（爆速）</option>
        <option value="gemini">Google Gemini</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="anthropic">Anthropic (Claude)</option>
      </select>
      <div class="provider-info" id="providerInfo"></div>
    </div>

    <div class="field" id="apiKeyField">
      <label id="apiKeyLabel">APIキー</label>
      <div class="desc" id="apiKeyDesc">キーはブラウザのローカルストレージに保存され、外部には送信されません</div>
      <input type="password" id="apiKey" placeholder="APIキーを入力">
      <div class="desc" id="apiKeyLink" style="margin-top:6px;"></div>
    </div>

    <div class="btn-row">
      <button class="test-btn" id="testBtn">接続テスト</button>
      <button class="save-btn" id="saveBtn">保存</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="options.js"></script>
</body>
</html>
