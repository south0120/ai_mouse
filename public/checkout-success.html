<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>決済完了 - AI辞書</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 420px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 12px; color: #333; }
    p { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 24px; }
    .note { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>決済が完了しました</h1>
    <p>プランのアップグレードありがとうございます。<br>このタブを閉じて、AI辞書をお楽しみください。</p>
    <p class="note">プランの反映には数秒かかる場合があります。<br>サイドパネルを再度開くと最新の状態が表示されます。</p>
  </div>
</body>
</html>
